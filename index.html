<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends</title>

<style>

/* ===== RESET ===== */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: linear-gradient(180deg,#020617,#0f172a);
    color: #e2e8f0;
}

/* ===== HEADER ===== */
header {
    padding: 40px 20px 20px;
    text-align: center;
}

.logo {
    font-size: 2em;
    font-weight: 600;
    background: linear-gradient(90deg,#7aa2ff,#c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 0.9em;
    color: #94a3b8;
    margin-top: 6px;
}

/* ===== CONTAINER ===== */
.container {
    padding: 15px;
    padding-bottom: 90px;
}

/* ===== GLASS CARD ===== */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 15px;
    margin-bottom: 15px;
}

/* ===== IMAGE GRID ===== */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.grid img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 12px;
}

/* ===== CAKE ===== */
#cake {
    font-size: 60px;
    text-align: center;
    margin-top: 15px;
}

/* ===== GAME ===== */
#gameSection { display:none; }

#gameArea {
    width: 100%;
    height: 300px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
}

.cat {
    position: absolute;
    font-size: 30px;
}

/* ===== PANEL ===== */
.panel {
    text-align: center;
    margin: 10px 0;
    font-size: 1em;
}

button {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: #7aa2ff;
    color: black;
    font-weight: 500;
    width: 100%;
    margin-top: 8px;
}

/* ===== BOTTOM NAV ===== */
nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(15,23,42,0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
}

nav button {
    background: none;
    color: #cbd5f5;
    font-size: 0.9em;
}

/* ===== POPUP ===== */
#popup {
    position: fixed;
    inset: 0;
    background: rgba(2,6,23,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
}

.popupBox {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

.popupBox h2 {
    margin-bottom: 10px;
}

/* ===== ANIMATION ===== */
@keyframes fall {
    to { transform: translateY(100vh); }
}

</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
    <div class="popupBox">
        <h2>Happy Birthday, Tuks</h2>
        <p>A small space to celebrate today.</p>
        <button onclick="startApp()">Continue</button>
    </div>
</div>

<header>
    <div class="logo">Tuks & Friends</div>
    <div class="subtitle">Moments, memories, and a simple game</div>
</header>

<!-- HOME -->
<section id="homeSection" class="container">
    <div class="card">
        <div class="grid">
            <img src="cats/Tuks.jpg" onerror="this.src='https://placekitten.com/400/300'">
            <img src="cats/Albie.jpg" onerror="this.src='https://placekitten.com/401/300'">
            <img src="cats/Cassie.jpg" onerror="this.src='https://placekitten.com/402/300'">
            <img src="cats/Tuks.jpg" onerror="this.src='https://placekitten.com/403/300'">
        </div>

        <div id="cake">🎂</div>
    </div>
</section>

<!-- GAME -->
<section id="gameSection" class="container">
    <div class="card">
        <div class="panel">
            Score: <span id="score">0</span> |
            Time: <span id="time">30</span>
        </div>

        <button onclick="startGame()">Start Game</button>

        <div id="gameArea"></div>
    </div>
</section>

<!-- NAV -->
<nav>
    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showGame()">🎮 Game</button>
</nav>

<audio id="music" loop>
<source src="birthday.mp3">
</audio>

<script>

/* START */
function startApp(){
    popup.style.display="none";
    music.play().catch(()=>{});
    confetti();
}

/* NAV */
function showHome(){
    homeSection.style.display="block";
    gameSection.style.display="none";
}
function showGame(){
    homeSection.style.display="none";
    gameSection.style.display="block";
}

/* CONFETTI */
function confetti(){
    for(let i=0;i<25;i++){
        let c=document.createElement("div");
        c.innerText="✨";
        c.style.position="fixed";
        c.style.left=Math.random()*100+"%";
        c.style.top="0";
        c.style.animation="fall 3s linear";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

/* GAME */
let score=0,time=30,game,timer;

function startGame(){
    score=0; time=30;
    scoreEl.innerText=score;
    timeEl.innerText=time;

    clearInterval(game);
    clearInterval(timer);

    timer=setInterval(()=>{
        time--;
        timeEl.innerText=time;
        if(time<=0) clearInterval(timer);
    },1000);

    game=setInterval(()=>{
        let cat=document.createElement("div");
        cat.className="cat";
        cat.innerText="🐱";

        cat.style.left=Math.random()*90+"%";
        cat.style.top=Math.random()*80+"%";

        cat.onclick=()=>{
            score++;
            scoreEl.innerText=score;
            cat.remove();
        };

        gameArea.appendChild(cat);
        setTimeout(()=>cat.remove(),1200);
    },600);
}

/* CAKE */
cake.onclick=()=>{
    for(let i=0;i<15;i++){
        let c=document.createElement("div");
        c.innerText="🐱";
        c.style.position="fixed";
        c.style.left="50%";
        c.style.top="50%";

        let x=(Math.random()-0.5)*400;
        let y=(Math.random()-0.5)*400;

        c.animate([
            {transform:"translate(0,0)",opacity:1},
            {transform:`translate(${x}px,${y}px)`,opacity:0}
        ],{duration:800});

        document.body.appendChild(c);
        setTimeout(()=>c.remove(),800);
    }
};

/* SHORTCUTS */
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const gameArea=document.getElementById("gameArea");
const homeSection=document.getElementById("homeSection");
const gameSection=document.getElementById("gameSection");
const popup=document.getElementById("popup");
const music=document.getElementById("music");
const cake=document.getElementById("cake");

</script>

</body>
</html>
