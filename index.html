<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: #e6e6e6;
}

/* 📱 MOBILE APP STYLE UI */
header {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    text-align: center;
    padding: 60px 20px;
}

.logo {
    font-size: 2.5em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-around;
    background: #1a1d24;
    padding: 10px;
    position: sticky;
    top: 0;
}

nav button {
    background: transparent;
    border: 1px solid #7aa2ff;
    color: white;
    padding: 8px 12px;
    border-radius: 10px;
}

/* SECTIONS */
.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

/* GAME AREA */
#playArea {
    width: 100%;
    height: 300px;
    background: #1a1d24;
    border-radius: 15px;
    position: relative;
    overflow: hidden;
}

.cat {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
}

/* BOSS CAT */
.boss {
    font-size: 45px !important;
    animation: shake 0.2s infinite;
}

@keyframes shake {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(10deg); }
    100% { transform: rotate(-10deg); }
}

/* BUTTON */
.btn {
    padding: 10px 15px;
    background: #7aa2ff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
}

/* LEADERBOARD */
#leaderboard {
    background: #1a1d24;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
    <p>Ultimate Cat Game Edition</p>
</header>

<nav>
    <button onclick="showGame()">🎮 Game</button>
    <button onclick="resetHigh()">🏆 Reset High Score</button>
</nav>

<div class="container">

<!-- GAME -->
<section id="gameSection">

    <h2>🐱 Catch the Cats Challenge</h2>

    <p>⏱ Time: <span id="time">30</span>s</p>
    <p>⭐ Score: <span id="score">0</span></p>

    <button class="btn" onclick="startGame()">Start Game</button>

    <div id="playArea"></div>

    <div id="leaderboard">
        🏆 High Score: <span id="highscore">0</span>
    </div>

</section>

</div>

<script>

let score = 0;
let time = 30;
let gameInterval;
let timerInterval;
let bossSpawned = false;

// 🏆 load high score
let highScore = localStorage.getItem("catHighScore") || 0;
document.getElementById("highscore").innerText = highScore;

// 🔊 simple beep sound
function playSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = "square";
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
}

// 🎮 start game
function startGame() {
    score = 0;
    time = 30;
    bossSpawned = false;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    const area = document.getElementById("playArea");
    area.innerHTML = "";

    clearInterval(gameInterval);
    clearInterval(timerInterval);

    // timer
    timerInterval = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            endGame();
        }
    }, 1000);

    // spawn cats
    gameInterval = setInterval(() => {
        spawnCat();
    }, 700);
}

// 🐱 spawn cat
function spawnCat() {
    const area = document.getElementById("playArea");

    const cat = document.createElement("div");
    cat.classList.add("cat");
    cat.innerText = "🐱";

    cat.style.left = Math.random() * 90 + "%";
    cat.style.top = Math.random() * 80 + "%";

    // 🐱 boss cat every 10 score
    if (score > 0 && score % 10 === 0 && !bossSpawned) {
        cat.innerText = "🐱👑";
        cat.classList.add("boss");
        bossSpawned = true;
    }

    cat.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        playSound();
        cat.remove();

        if (score % 10 !== 0) bossSpawned = false;
    };

    area.appendChild(cat);

    setTimeout(() => {
        cat.remove();
    }, 1500);
}

// 🏁 end game
function endGame() {
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("catHighScore", highScore);
        document.getElementById("highscore").innerText = highScore;
        alert("🏆 NEW HIGH SCORE: " + score);
    } else {
        alert("Game Over! Score: " + score);
    }
}

// reset leaderboard
function resetHigh() {
    localStorage.removeItem("catHighScore");
    highScore = 0;
    document.getElementById("highscore").innerText = 0;
}

// show game (future expand)
function showGame() {
    alert("Game is already visible 🐱");
}

</script>

</body>
</html>
