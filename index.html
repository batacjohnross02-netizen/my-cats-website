<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: white;
    overflow-x: hidden;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
    animation: moveBG 20s linear infinite;
    z-index: -1;
}

@keyframes moveBG {
    100% { transform: translate(-20%, -20%); }
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.logo {
    font-size: 2.5em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: #1a1d24;
    padding: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
}

nav button {
    padding: 10px 15px;
    border: 1px solid #7aa2ff;
    background: transparent;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

nav button:hover {
    background: #7aa2ff;
    color: black;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
}

/* GAME */
#gameSection { display: none; }

#gameArea {
    width: 100%;
    height: 350px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    position: relative;
    overflow: hidden;
}

.cat {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
}

.boss {
    font-size: 45px !important;
    animation: shake 0.2s infinite;
}

@keyframes shake {
    50% { transform: rotate(10deg); }
}

.particle {
    position: absolute;
    animation: pop 0.5s ease-out forwards;
}

@keyframes pop {
    to { transform: scale(2); opacity: 0; }
}

.panel {
    text-align: center;
    margin: 10px;
}

#leaderboard {
    text-align: center;
    padding: 10px;
    background: #1a1d24;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
</header>

<nav>
    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showGame()">🎮 Cat Games</button>
</nav>

<section id="homeSection" class="container">
    <h2>Meet My Cats 🐾</h2>

    <div class="grid">
        <div class="card"><img src="cats/Tuks.jpg" onerror="this.src='https://placekitten.com/400/300'"></div>
        <div class="card"><img src="cats/Albie.jpg" onerror="this.src='https://placekitten.com/401/300'"></div>
        <div class="card"><img src="cats/Cassie.jpg" onerror="this.src='https://placekitten.com/402/300'"></div>
    </div>
</section>

<section id="gameSection" class="container">

<h2>🐱 Cat Games</h2>

<div class="panel">
Score: <span id="score">0</span> |
Time: <span id="time">30</span>
</div>

<div class="panel">
<button onclick="startGame()">Start</button>
<button onclick="toggleMusic()">🎵</button>

<select onchange="setSpeed(this.value)">
<option value="800">Easy</option>
<option value="500">Medium</option>
<option value="300">Hard</option>
</select>
</div>

<div id="gameArea"></div>

<div id="leaderboard">
🏆 High Score: <span id="high">0</span>
</div>

<div class="panel">
🏅 <span id="achievements"></span>
</div>

</section>

<audio id="music" loop>
<source src="catsong.mp3">
</audio>

<script>
let score = 0;
let time = 30;
let speed = 800;
let game, timer;
let musicOn = false;

let unlocked = [];
let high = localStorage.getItem("highScore") || 0;
document.getElementById("high").innerText = high;

/* NAV */
function showHome(){
    homeSection.style.display = "block";
    gameSection.style.display = "none";
}

function showGame(){
    homeSection.style.display = "none";
    gameSection.style.display = "block";
}

/* START */
function startGame(){
    score = 0;
    time = 30;
    unlocked = [];

    scoreEl.innerText = score;
    timeEl.innerText = time;
    achievements.innerText = "";

    gameArea.innerHTML = "";

    clearInterval(game);
    clearInterval(timer);

    timer = setInterval(()=>{
        time--;
        timeEl.innerText = time;
        if(time<=0) endGame();
    },1000);

    game = setInterval(spawnCat, speed);
}

/* SOUND FIX */
let audioCtx;
function beep(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let o = audioCtx.createOscillator();
    o.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + 0.05);
}

/* SPAWN */
function spawnCat(){
    if(document.querySelectorAll(".cat").length > 15) return;

    const cat = document.createElement("div");
    cat.className = "cat";

    let skins = ["🐱","🐈","😺","😻"];
    cat.innerText = skins[Math.floor(Math.random()*skins.length)];

    cat.style.left = Math.random()*90+"%";
    cat.style.top = Math.random()*80+"%";

    if(score !== 0 && score % 10 === 0){
        cat.innerText = "🐱👑";
        cat.classList.add("boss");
    }

    cat.onclick = ()=>{
        score++;
        scoreEl.innerText = score;
        beep();

        for(let i=0;i<5;i++){
            let p = document.createElement("div");
            p.className="particle";
            p.innerText="✨";
            p.style.left=cat.style.left;
            p.style.top=cat.style.top;
            gameArea.appendChild(p);
            setTimeout(()=>p.remove(),500);
        }

        cat.remove();
        updateHigh();
        checkAch();
    };

    gameArea.appendChild(cat);
    setTimeout(()=>cat.remove(),1500);
}

/* END */
function endGame(){
    clearInterval(game);
    clearInterval(timer);
    alert("Game Over! Score: "+score);
}

/* HIGH */
function updateHigh(){
    if(score > high){
        high = score;
        localStorage.setItem("highScore", high);
        highEl.innerText = high;
    }
}

/* MUSIC */
function toggleMusic(){
    let m = document.getElementById("music");
    musicOn ? m.pause() : m.play();
    musicOn = !musicOn;
}

/* SPEED */
function setSpeed(v){
    speed = parseInt(v);
}

/* ACH */
function checkAch(){
    if(score>=1 && !unlocked.includes("Starter")){
        unlocked.push("Starter");
    }
    if(score>=10 && !unlocked.includes("Hunter")){
        unlocked.push("Hunter");
    }
    if(score>=20 && !unlocked.includes("Master")){
        unlocked.push("Master");
    }

    achievements.innerText = unlocked.join(" | ");
}

/* SHORTCUTS */
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const highEl = document.getElementById("high");
const gameArea = document.getElementById("gameArea");
const achievements = document.getElementById("achievements");
const homeSection = document.getElementById("homeSection");
const gameSection = document.getElementById("gameSection");
</script>

</body>
</html>
