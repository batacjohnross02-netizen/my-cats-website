<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: #e6e6e6;
    overflow-x: hidden;
}

/* 🔥 LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease forwards;
    animation-delay: 2.5s;
}

#loader h1 {
    color: #7aa2ff;
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* 🐱 CURSOR CAT */
#cursor-cat {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 1000;
}

/* 🐱 FLOATING CATS */
.floating-cat {
    position: fixed;
    bottom: -100px;
    font-size: 25px;
    opacity: 0.5;
    animation: floatUp linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

/* HEADER */
header {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    text-align: center;
    padding: 70px;
}

.logo {
    font-size: 3em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
    background: #1a1d24;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* GAME AREA */
#game {
    text-align: center;
    padding: 40px;
}

#playArea {
    position: relative;
    width: 100%;
    height: 300px;
    background: #1a1d24;
    margin-top: 20px;
    overflow: hidden;
    border-radius: 15px;
}

.cat {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
    transition: 0.2s;
}

button {
    padding: 10px 20px;
    background: #7aa2ff;
    border: none;
    cursor: pointer;
    margin-top: 10px;
    border-radius: 10px;
}

/* CATS GRID */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: #1a1d24;
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #1a1d24;
}
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
    <h1>🐱 TUKS & FRIENDS</h1>
    <p>Loading cats...</p>
</div>

<!-- 🐱 CURSOR -->
<div id="cursor-cat">🐱</div>

<!-- FLOATING CATS -->
<div class="floating-cat" style="left:10%; animation-duration:8s;">🐱</div>
<div class="floating-cat" style="left:40%; animation-duration:10s;">🐈</div>
<div class="floating-cat" style="left:70%; animation-duration:7s;">🐱</div>

<!-- HEADER -->
<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
    <p>Premium Cat Collection</p>
</header>

<!-- NAV -->
<nav>
    <a href="#game">Game</a>
    <a href="#cats">Cats</a>
</nav>

<!-- 🎮 MINI CAT GAME -->
<section id="game">
    <h2>🎮 Catch the Cats Game</h2>
    <p>Click the cats as fast as you can!</p>
    <p>Score: <span id="score">0</span></p>

    <button onclick="startGame()">Start Game</button>

    <div id="playArea"></div>
</section>

<!-- 🐱 CATS -->
<div class="container" id="cats">
    <h2>Meet My Cats 🐾</h2>

    <div class="grid">
        <div class="card"><img src="cats/Tuks.jpg"></div>
        <div class="card"><img src="cats/Albie.jpg"></div>
        <div class="card"><img src="cats/Cassie.jpg"></div>
    </div>
</div>

<footer>
    <p>© 2026 Tuks & Friends</p>
</footer>

<!-- SCRIPT -->
<script>

let score = 0;
let gameInterval;

function startGame() {
    score = 0;
    document.getElementById("score").innerText = score;

    const area = document.getElementById("playArea");
    area.innerHTML = "";

    gameInterval = setInterval(() => {
        spawnCat();
    }, 800);
}

function spawnCat() {
    const area = document.getElementById("playArea");

    const cat = document.createElement("div");
    cat.classList.add("cat");
    cat.innerText = "🐱";

    cat.style.left = Math.random() * 90 + "%";
    cat.style.top = Math.random() * 80 + "%";

    cat.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        cat.remove();
    };

    area.appendChild(cat);

    setTimeout(() => {
        cat.remove();
    }, 1500);
}

// cursor follow cat
document.addEventListener("mousemove", (e) => {
    const c = document.getElementById("cursor-cat");
    c.style.left = e.clientX + 10 + "px";
    c.style.top = e.clientY + 10 + "px";
});

</script>

</body>
</html>
