<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: #e6e6e6;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    text-align: center;
    padding: 70px 20px;
}

.logo {
    font-size: 3em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
    background: #1a1d24;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    position: sticky;
    top: 0;
}

nav button {
    background: transparent;
    border: 1px solid #7aa2ff;
    color: white;
    padding: 8px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav button:hover {
    background: #7aa2ff;
    color: black;
}

/* SECTIONS */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1a1d24;
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* GAME */
#gameSection {
    display: none;
    text-align: center;
}

#playArea {
    width: 100%;
    height: 300px;
    background: #1a1d24;
    border-radius: 15px;
    position: relative;
    overflow: hidden;
}

.cat {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
}

/* BUTTON */
.startBtn {
    padding: 10px 20px;
    background: #7aa2ff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
    <p>Premium Cat Collection</p>
</header>

<!-- NAV BUTTONS -->
<nav>
    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showGame()">🎮 Cat Games</button>
</nav>

<!-- HOME -->
<section id="homeSection" class="container">

    <h2>Meet My Cats 🐾</h2>

    <div class="grid">
        <div class="card"><img src="cats/Tuks.jpg"></div>
        <div class="card"><img src="cats/Albie.jpg"></div>
        <div class="card"><img src="cats/Cassie.jpg"></div>
    </div>

</section>

<!-- GAME -->
<section id="gameSection" class="container">

    <h2>🎮 Catch the Cat Game</h2>
    <p>Click cats as fast as you can!</p>

    <p>Score: <span id="score">0</span></p>

    <button class="startBtn" onclick="startGame()">Start Game</button>

    <div id="playArea"></div>

</section>

<script>

let score = 0;
let gameInterval;

// NAV SWITCH
function showHome() {
    document.getElementById("homeSection").style.display = "block";
    document.getElementById("gameSection").style.display = "none";
}

function showGame() {
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
}

// GAME
function startGame() {
    score = 0;
    document.getElementById("score").innerText = score;

    const area = document.getElementById("playArea");
    area.innerHTML = "";

    clearInterval(gameInterval);

    gameInterval = setInterval(() => {
        spawnCat();
    }, 800);
}

function spawnCat() {
    const area = document.getElementById("playArea");

    const cat = document.createElement("div");
    cat.classList.add("cat");
    cat.innerText = "🐱";

    cat.style.left = Math.random() * 90 + "%";
    cat.style.top = Math.random() * 80 + "%";

    cat.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        cat.remove();
    };

    area.appendChild(cat);

    setTimeout(() => {
        cat.remove();
    }, 1500);
}

</script>

</body>
</html>
