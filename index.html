<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: #e6e6e6;
    overflow-x: hidden;
}

/* 🔥 NETFLIX LOADING SCREEN */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    animation: fadeOut 2s ease forwards;
    animation-delay: 3s;
}

#loader h1 {
    color: #7aa2ff;
    font-size: 2.5em;
    letter-spacing: 3px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* 🐱 FLOATING CATS */
.floating-cat {
    position: fixed;
    bottom: -100px;
    font-size: 28px;
    opacity: 0.5;
    animation: floatUp linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

/* 🐱 CURSOR FOLLOW CAT */
#cursor-cat {
    position: fixed;
    font-size: 30px;
    pointer-events: none;
    z-index: 1000;
    transition: transform 0.05s linear;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    text-align: center;
    padding: 80px 20px;
    position: relative;
}

.logo {
    font-size: 3em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s infinite linear;
}

@keyframes shine {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
}

/* NAV */
nav {
    background: #1a1d24;
    text-align: center;
    padding: 10px;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* CONTENT */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1a1d24;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.badge {
    background: #7aa2ff;
    color: #000;
    padding: 5px 10px;
    border-radius: 20px;
}

/* AUDIO */
audio {
    display: block;
    margin: 20px auto;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #1a1d24;
}
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">
    <h1>🐱 TUKS & FRIENDS</h1>
    <p>Loading cats...</p>
</div>

<!-- 🐱 CURSOR CAT -->
<div id="cursor-cat">🐱</div>

<!-- 🐱 FLOATING CATS -->
<div class="floating-cat" style="left:10%; animation-duration:8s;">🐱</div>
<div class="floating-cat" style="left:30%; animation-duration:10s;">🐈</div>
<div class="floating-cat" style="left:50%; animation-duration:7s;">🐱</div>
<div class="floating-cat" style="left:70%; animation-duration:12s;">🐈</div>
<div class="floating-cat" style="left:90%; animation-duration:9s;">🐱</div>

<!-- HEADER -->
<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
    <p>Premium Cat Collection</p>
</header>

<!-- NAV -->
<nav>
    <a href="#cats">Cats</a>
    <a href="#about">About</a>
</nav>

<!-- MUSIC -->
<audio controls loop>
    <source src="catsong.mp3" type="audio/mpeg">
</audio>

<!-- CATS -->
<div class="container" id="cats">
    <h2>Meet My Cats 🐾</h2>

    <div class="grid">

        <div class="card">
            <img src="cats/Tuks.jpg">
            <div class="card-content">
                <h3>Tuks</h3>
                <span class="badge">Sleepy 😴</span>
            </div>
        </div>

        <div class="card">
            <img src="cats/Albie.jpg">
            <div class="card-content">
                <h3>Albie</h3>
                <span class="badge">Chaos 🧡</span>
            </div>
        </div>

        <div class="card">
            <img src="cats/Cassie.jpg">
            <div class="card-content">
                <h3>Cassie</h3>
                <span class="badge">Ninja 🥷</span>
            </div>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="container" id="about">
    <h2>About</h2>
    <p>My cats live here rent-free 🐱</p>
</div>

<footer>
    <p>© 2026 Tuks & Friends</p>
</footer>

<!-- SCRIPT -->
<script>
// 🔥 loader remove after 3s
setTimeout(() => {
    document.getElementById("loader").style.display = "none";
}, 3000);

// 🐱 cursor follow cat
const cursorCat = document.getElementById("cursor-cat");

document.addEventListener("mousemove", (e) => {
    cursorCat.style.left = e.clientX + 10 + "px";
    cursorCat.style.top = e.clientY + 10 + "px";
});
</script>

</body>
</html>
