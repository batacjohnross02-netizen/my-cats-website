<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: white;
    overflow-x: hidden;
}

/* 🌌 GALAXY BACKGROUND (NEW) */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
    animation: moveBG 20s linear infinite;
    z-index: -1;
}

@keyframes moveBG {
    0% { transform: translate(0,0); }
    100% { transform: translate(-20%, -20%); }
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.logo {
    font-size: 2.5em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV (UNCHANGED STRUCTURE) */
nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: #1a1d24;
    padding: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
}

nav button {
    padding: 10px 15px;
    border: 1px solid #7aa2ff;
    background: transparent;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav button:hover {
    background: #7aa2ff;
    color: black;
}

/* SECTIONS */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HOME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

.card {
    background: #1a1d24;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* GAME AREA */
#gameSection {
    display: none;
}

#gameArea {
    width: 100%;
    height: 350px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    position: relative;
    overflow: hidden;
}

/* CAT SKINS */
.cat {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
    transition: 0.1s;
}

.boss {
    font-size: 45px !important;
    animation: shake 0.2s infinite;
}

@keyframes shake {
    0% { transform: rotate(0); }
    50% { transform: rotate(10deg); }
}

/* PARTICLES */
.particle {
    position: absolute;
    animation: pop 0.5s ease-out forwards;
}

@keyframes pop {
    to { transform: scale(2); opacity: 0; }
}

/* MOBILE STYLE SCORE PANEL */
.panel {
    text-align: center;
    margin: 10px;
    font-size: 14px;
}

/* LEADERBOARD */
#leaderboard {
    text-align: center;
    padding: 10px;
    background: #1a1d24;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
</header>

<!-- NAV (KEEP SAME STRUCTURE) -->
<nav>
    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showGame()">🎮 Cat Games</button>
</nav>

<!-- HOME -->
<section id="homeSection" class="container">
    <h2>Meet My Cats 🐾</h2>

    <div class="grid">
        <div class="card"><img src="cats/Tuks.jpg"></div>
        <div class="card"><img src="cats/Albie.jpg"></div>
        <div class="card"><img src="cats/Cassie.jpg"></div>
    </div>
</section>

<!-- GAME -->
<section id="gameSection" class="container">

    <h2>🐱 Cat Games</h2>

    <div class="panel">
        Score: <span id="score">0</span> |
        Time: <span id="time">30</span>
    </div>

    <div class="panel">
        <button onclick="startGame()">Start</button>
        <button onclick="toggleMusic()">🎵</button>

        <select onchange="setSpeed(this.value)">
            <option value="800">Easy</option>
            <option value="500">Medium</option>
            <option value="300">Hard</option>
        </select>
    </div>

    <div id="gameArea"></div>

    <div id="leaderboard">
        🏆 High Score: <span id="high">0</span>
    </div>

    <div class="panel">
        🏅 <span id="achievements"></span>
    </div>

</section>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="catsong.mp3">
</audio>

<script>

let score = 0;
let time = 30;
let speed = 800;
let game;
let timer;
let musicOn = false;
let unlocked = [];

let high = localStorage.getItem("highScore") || 0;
document.getElementById("high").innerText = high;

/* NAV */
function showHome(){
    document.getElementById("homeSection").style.display = "block";
    document.getElementById("gameSection").style.display = "none";
}

function showGame(){
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
}

/* START */
function startGame(){
    score = 0;
    time = 30;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    clearInterval(game);
    clearInterval(timer);

    timer = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = time;
        if(time<=0) endGame();
    },1000);

    game = setInterval(spawnCat, speed);
}

/* SOUND */
function beep(){
    let ctx = new AudioContext();
    let o = ctx.createOscillator();
    o.frequency.value = 500;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.1);
}

/* SPAWN CAT */
function spawnCat(){
    const area = document.getElementById("gameArea");

    const cat = document.createElement("div");
    cat.classList.add("cat");

    let skins = ["🐱","🐈","😺","😻"];
    cat.innerText = skins[Math.floor(Math.random()*skins.length)];

    cat.style.left = Math.random()*90+"%";
    cat.style.top = Math.random()*80+"%";

    if(score>0 && score%10===0){
        cat.innerText = "🐱👑";
        cat.classList.add("boss");
    }

    cat.onclick = ()=>{
        score++;
        document.getElementById("score").innerText = score;
        beep();

        // particles
        for(let i=0;i<5;i++){
            let p = document.createElement("div");
            p.classList.add("particle");
            p.innerText = "✨";
            p.style.left = cat.style.left;
            p.style.top = cat.style.top;
            area.appendChild(p);
            setTimeout(()=>p.remove(),500);
        }

        cat.remove();
        updateHigh();
        checkAch();
    };

    area.appendChild(cat);

    setTimeout(()=>cat.remove(),1500);
}

/* END */
function endGame(){
    clearInterval(game);
    clearInterval(timer);
    updateHigh();
    alert("Game Over! Score: "+score);
}

/* HIGH SCORE */
function updateHigh(){
    if(score > high){
        high = score;
        localStorage.setItem("highScore", high);
        document.getElementById("high").innerText = high;
    }
}

/* MUSIC */
function toggleMusic(){
    let m = document.getElementById("music");
    if(musicOn){
        m.pause();
        musicOn=false;
    } else {
        m.play();
        musicOn=true;
    }
}

/* SPEED */
function setSpeed(v){
    speed = parseInt(v);
}

/* ACHIEVEMENTS */
function checkAch(){
    let msg=[];

    if(score>=1 && !unlocked.includes("1")){
        unlocked.push("1");
        msg.push("🥉 Starter");
    }
    if(score>=10 && !unlocked.includes("10")){
        unlocked.push("10");
        msg.push("🥈 Hunter");
    }
    if(score>=20 && !unlocked.includes("20")){
        unlocked.push("20");
        msg.push("🥇 Master");
    }

    document.getElementById("achievements").innerText = msg.join(" | ");
}

</script>

</body>
</html>
