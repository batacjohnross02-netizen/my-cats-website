<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuks & Friends 🐱</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #0f1115;
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.logo {
    font-size: 2.5em;
    background: linear-gradient(90deg,#7aa2ff,#fff,#ff7aa2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: #1a1d24;
    padding: 10px;
    position: sticky;
    top: 0;
}

nav button {
    padding: 10px 15px;
    border: 1px solid #7aa2ff;
    background: transparent;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

nav button:hover {
    background: #7aa2ff;
    color: black;
}

/* SECTIONS */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* HOME GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

.card {
    background: #1a1d24;
    border-radius: 15px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* GAME AREA */
#gameSection {
    display: none;
}

#gameArea {
    width: 100%;
    height: 350px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    position: relative;
    overflow: hidden;
}

.cat {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
}

/* BOSS */
.boss {
    font-size: 45px !important;
}

/* PARTICLES */
.particle {
    position: absolute;
    animation: pop 0.5s ease-out forwards;
}

@keyframes pop {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(2); opacity: 0; }
}

/* PANEL */
.panel {
    text-align: center;
    margin: 10px;
}
</style>
</head>

<body>

<header>
    <h1 class="logo">🐱 TUKS & FRIENDS 🐱</h1>
</header>

<!-- NAV BUTTONS (IMPORTANT FIXED) -->
<nav>
    <button onclick="showHome()">🏠 Home</button>
    <button onclick="showGame()">🎮 Cat Games</button>
</nav>

<!-- 🏠 HOME -->
<section id="homeSection" class="container">

    <h2>Meet My Cats 🐾</h2>

    <div class="grid">
        <div class="card"><img src="cats/Tuks.jpg"></div>
        <div class="card"><img src="cats/Albie.jpg"></div>
        <div class="card"><img src="cats/Cassie.jpg"></div>
    </div>

</section>

<!-- 🎮 GAME -->
<section id="gameSection" class="container">

    <h2>🐱 Cat Games</h2>

    <div class="panel">
        Score: <span id="score">0</span> |
        Time: <span id="time">30</span>
    </div>

    <div class="panel">
        <button onclick="startGame()">Start Game</button>
        <button onclick="toggleMusic()">🎵 Music</button>

        <select onchange="setSpeed(this.value)">
            <option value="800">Easy</option>
            <option value="500">Medium</option>
            <option value="300">Hard</option>
        </select>
    </div>

    <div id="gameArea"></div>

    <div class="panel">
        🏅 <span id="achievements"></span>
    </div>

</section>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="catsong.mp3">
</audio>

<script>

let score = 0;
let time = 30;
let speed = 800;
let gameInterval;
let timer;
let musicOn = false;
let unlocked = [];

/* NAV FIX */
function showHome(){
    document.getElementById("homeSection").style.display = "block";
    document.getElementById("gameSection").style.display = "none";
}

function showGame(){
    document.getElementById("homeSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
}

/* GAME START */
function startGame(){
    score = 0;
    time = 30;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    clearInterval(gameInterval);
    clearInterval(timer);

    timer = setInterval(()=>{
        time--;
        document.getElementById("time").innerText = time;
        if(time<=0) endGame();
    },1000);

    gameInterval = setInterval(spawnCat, speed);
}

/* SPAWN CAT */
function spawnCat(){
    const game = document.getElementById("gameArea");

    const cat = document.createElement("div");
    cat.classList.add("cat");

    let skins = ["🐱","🐈","😺","😻"];
    cat.innerText = skins[Math.floor(Math.random()*skins.length)];

    cat.style.left = Math.random()*90+"%";
    cat.style.top = Math.random()*80+"%";

    if(score>0 && score%10===0){
        cat.innerText = "🐱👑";
        cat.classList.add("boss");
    }

    cat.onclick = ()=>{
        score++;
        document.getElementById("score").innerText = score;

        // particles
        for(let i=0;i<5;i++){
            let p = document.createElement("div");
            p.classList.add("particle");
            p.innerText = "✨";
            p.style.left = cat.style.left;
            p.style.top = cat.style.top;
            game.appendChild(p);
            setTimeout(()=>p.remove(),500);
        }

        cat.remove();
        checkAchievements();
    };

    game.appendChild(cat);

    setTimeout(()=>cat.remove(),1500);
}

/* END */
function endGame(){
    clearInterval(gameInterval);
    clearInterval(timer);
    alert("Game Over! Score: "+score);
}

/* MUSIC */
function toggleMusic(){
    let m = document.getElementById("music");
    if(musicOn){
        m.pause();
        musicOn = false;
    } else {
        m.play();
        musicOn = true;
    }
}

/* SPEED */
function setSpeed(val){
    speed = parseInt(val);
}

/* ACHIEVEMENTS */
function checkAchievements(){
    let msg = [];

    if(score>=1 && !unlocked.includes("start")){
        unlocked.push("start");
        msg.push("🥉 First Cat!");
    }

    if(score>=10 && !unlocked.includes("10")){
        unlocked.push("10");
        msg.push("🥈 Hunter!");
    }

    if(score>=20 && !unlocked.includes("20")){
        unlocked.push("20");
        msg.push("🥇 Master!");
    }

    document.getElementById("achievements").innerText = msg.join(" | ");
}

</script>

</body>
</html>
